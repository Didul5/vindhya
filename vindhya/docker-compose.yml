services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vindhya_postgres
    environment:
      POSTGRES_USER: vindhya
      POSTGRES_PASSWORD: vindhya123
      POSTGRES_DB: vindhya
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vindhya"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vindhya_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: vindhya_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vindhya:vindhya123@postgres:5432/vindhya
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: supersecretkey-change-in-production-please
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "10080"
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads_data:
